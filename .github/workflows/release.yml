name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: npm
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24.11.1
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11.18.0
      - run: bun install --frozen-lockfile
      - run: bun audit --audit-level=high
      - run: bun run check
      - run: bun run test:coverage
      - run: bun run build
      - run: node --input-type=module --eval 'const mod = await import("./dist/index.js"); if (typeof mod.TypeTypeMsePlayer !== "function") process.exit(1)'
      - name: Verify release version
        run: test "v$(node --print "require('./package.json').version")" = "$GITHUB_REF_NAME"
      - name: Pack release
        id: pack
        run: echo "filename=$(npm pack --json --ignore-scripts | jq --raw-output '.[0].filename')" >> "$GITHUB_OUTPUT"
      - uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763
        with:
          subject-path: ${{ steps.pack.outputs.filename }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: npm-package
          path: ${{ steps.pack.outputs.filename }}
          if-no-files-found: error
          retention-days: 30
      - run: npm publish "${{ steps.pack.outputs.filename }}" --access public --provenance
